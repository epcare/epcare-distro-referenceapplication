name: Build and Push UgandaEMR Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/epcare-distro
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/epcare-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # 1. Checkout Repository
      # -----------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------------
      # 2. Set up QEMU (for ARM builds)
      # -----------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # -----------------------------------
      # 3. Set up Docker Buildx
      # -----------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------
      # 4. Login to Docker Hub
      # -----------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------------
      # 5. Backend Image (Multi-Arch)
      # -----------------------------------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      # -----------------------------------
      # 6. Frontend Image (Multi-Arch)
      # -----------------------------------
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      # -----------------------------------
      # 7. Print Image Summary
      # -----------------------------------
      - name: Show Image Digests
        run: |
          echo "Backend Image:"
          echo "${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
          echo ""
          echo "Frontend Image:"
          echo "${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"
